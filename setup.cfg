# All configuration for plugins and other utils is defined here.
# Read more about `setup.cfg`:
# https://docs.python.org/3/distutils/configfile.html

[flake8]
# Base flake8 configuration:
# https://flake8.pycqa.org/en/latest/user/configuration.html
format = wemake
show-source = true
statistics = false
doctests = true

# darglint configuration:
# https://github.com/terrencepreilly/darglint
strictness = long
docstring-style = numpy

# Plugins:
max-try-body-length = 3
max-complexity = 6
max-line-length = 88
inline-quotes = double

# wemake-python-styleguide settings:
i-control-code = false

# IMPORTANT: avoid using ignore option, always use extend-ignore instead
# Completely and unconditionally ignore the following errors:
extend-ignore = I004, E800
  # I004  # flake8-isort is drunk + we have isort integrated into pre-commit

# Disable some pydocstyle checks:
# Exclude some pydoctest checks globally:
# ignore = D100, D104, D106, D401, W504, X100, RST303, RST304, DAR103, DAR203, E800, DAR005

# Excluding some directories:
exclude =
  .git
  __pycache__
  .venv
  .eggs
  *.egg
  migrations

# Ignoring some errors in some files:
# B008   Do not perform function calls in argument defaults
# WPS404 Found complex default value
# WPS348 Found a line that starts with a dot
# WPS221 Found line with high Jones Complexity
# WPS201 Found module with too many imports
# E711  comparison to None should be 'if cond is None:'
# WPS226 Found string literal over-use
per-file-ignores =
  # main.py: B008, DAR301, WPS404
  # app/core/config.py: WPS115
  # app/models.py: WPS202
  app/routes/shared.py: WPS232
  app/routes/*/router.py: B008, WPS404, WPS221, WPS201, WPS226
  app/routes/*/controller.py: WPS348, WPS221, WPS202, E711, WPS201
  app/main.py: WPS201
  # Enable `assert` keyword and magic numbers for tests:  # , WPS226,
  tests/*.py: WPS433, WPS432, D103, WPS442
  tests/**/*.py: S101, WPS432, D103




[isort]
# isort configuration:
# https://pycqa.github.io/isort/docs/configuration/options.html
profile = black


[tool:pytest]
# Directories that are not visited by pytest collector:
norecursedirs = *.egg .eggs dist build docs .tox .git __pycache__

# Strict `@xfail` by default:
xfail_strict = true

# Extra options:
addopts =
  --strict-markers
  --strict-config
  --tb=short
  --doctest-modules
  --cov=app
  --cov-report=term-missing:skip-covered
  --cov-report=html
  --cov-report=xml
  --cov-branch
  --cov-fail-under=50


[mypy]
# mypy configurations: http://bit.ly/2zEl9WI
enable_error_code =
  truthy-bool,
  truthy-iterable,
  redundant-expr,
  unused-awaitable,
  ignore-without-code,
  possibly-undefined,
  redundant-self,

explicit_package_bases = true
ignore_missing_imports = true
strict = true
warn_unreachable = true


[doc8]
# doc8 configuration: https://pypi.org/project/doc8/
ignore-path = docs/_build
max-line-length = 80
sphinx = true

[coverage]
exclude_lines =
  pragma: no cover
